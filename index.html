    function buildSnakeOrder(order) {
      const picks = [];
      for (let r = 0; r < TOTAL_ROUNDS; r++) {
        const o = r % 2 === 0 ? [...order] : [...order].reverse();
        o.forEach((m, i) => picks.push({ pickNumber: r * 4 + i + 1, round: r + 1, manager: m }));
      }
      return picks;
    }

    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

      const [configRows, pickRows, resultRows] = await Promise.all([
        sbGet("config", "select=key,value"),
        sbGet("picks", "select=manager,team_id,pick_number&order=pick_number.asc"),
        sbGet("results", "select=team_id,type,round_key"),
      ]);
      if (configRows === null) return null;
      const config = {};
      (configRows || []).forEach(r => { config[r.key] = r.value; });
      const picks = {};
      MANAGERS.forEach(m => picks[m] = []);
      (pickRows || []).forEach(r => { if (picks[r.manager] !== undefined) picks[r.manager].push(r.team_id); });
      const groupResults = {}, knockoutResults = {};
      (resultRows || []).forEach(r => {
        if (r.type === "group") groupResults[r.team_id] = r.round_key;
        else if (r.type === "knockout") {
          if (!knockoutResults[r.team_id]) knockoutResults[r.team_id] = [];
          if (!knockoutResults[r.team_id].includes(r.round_key)) knockoutResults[r.team_id].push(r.round_key);
        }
      });
      return {
        draftOrder: config.draft_order ? config.draft_order.split(",") : [],
        pickIndex: parseInt(config.pick_index || "0"),
        picks, groupResults, knockoutResults,
      };
    }

    // Parse "HH:MM PM" + date string into a proper Date object in ET (UTC-4 during DST)
    function parseETDateTime(dateStr, timeStr) {
      // Build an ET-aware timestamp: treat date+time as US Eastern (UTC-4 in summer)
      const [year, month, day] = dateStr.split("-").map(Number);
      const [timePart, ampm] = timeStr.split(" ");
      let [h, m] = timePart.split(":").map(Number);
      if (ampm === "PM" && h !== 12) h += 12;
      if (ampm === "AM" && h === 12) h = 0;
      // ET is UTC-4 during summer (EDT). Add 4h to get UTC.
      return new Date(Date.UTC(year, month - 1, day, h + 4, m));
    }

    function buildStaticMatches() {
      return SCHEDULE.map(g => {
        const homeId = resolveTeamId(g.homeTeam);
        const awayId = resolveTeamId(g.awayTeam);
        const dateObj = parseETDateTime(g.date, g.time);
        const displayDate = dateObj.toLocaleDateString("en-US", { month: "short", day: "numeric", weekday: "short" });
        const displayTime = dateObj.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
        return {
          id: g.id, homeTeam: g.homeTeam, awayTeam: g.awayTeam,
          homeId, awayId, homeScore: 0, awayScore: 0,
          completed: false, live: false, isKnockout: false,
          notes: `Group ${g.group}`, status: displayTime,
          displayDate, displayTime, dateObj, group: g.group,
        };
      }).sort((a, b) => a.dateObj - b.dateObj);
    }

    // ============================================================
    // ESPN API - fetches World Cup live/completed scores
    // Pulls a window of dates around today to catch all active matches
    // ============================================================
    async function fetchESPN() {
      try {
        // Full tournament window: opening match (Jun 11) through the final (Jul 19)
        const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200`;
        const r = await fetch(url, { headers: { "Accept": "application/json" } });
        if (!r.ok) return [];
        const data = await r.json();
        return data?.events || [];
      } catch { return []; }
    }

    function parseESPNMatches(events) {
      return events.map(ev => {
        const comp = ev.competitions?.[0];
        if (!comp) return null;
        const competitors = comp.competitors || [];
        const home = competitors.find(c => c.homeAway === "home") || competitors[0];
        const away = competitors.find(c => c.homeAway === "away") || competitors[1];
        if (!home || !away) return null;

        const homeName = home.team?.displayName || home.team?.name || "";
        const awayName = away.team?.displayName || away.team?.name || "";
        const statusType = comp.status?.type?.name || "";
        const completed = statusType === "STATUS_FINAL" || statusType === "STATUS_FULL_TIME";
        const live = statusType === "STATUS_IN_PROGRESS" || statusType === "STATUS_HALFTIME";
        const homeScore = parseInt(home.score || "0", 10);
        const awayScore = parseInt(away.score || "0", 10);

        // ESPN returns UTC ISO timestamps — convert to local time for display
        const dateObj = ev.date ? new Date(ev.date) : null;
        const displayDate = dateObj ? dateObj.toLocaleDateString("en-US", { month: "short", day: "numeric", weekday: "short" }) : "";
        const displayTime = dateObj ? dateObj.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }) : "";

        // Determine if knockout round
        const notesRaw = ev.season?.slug || comp.notes?.[0]?.headline || ev.name || "";
        const roundName = comp.notes?.[0]?.headline || notesRaw;
        const isKnockout = typeof roundName === "string" && ["round of 32","round of 16","quarter","semi","final","third"].some(k => roundName.toLowerCase().includes(k));

        // Clock display for live games
        const clockStr = comp.status?.displayClock ? `${comp.status.displayClock}'` : (live ? "Live" : "");
        const statusDisplay = live ? clockStr : completed ? "FT" : displayTime;

        return {
          id: String(ev.id),
          homeTeam: homeName, awayTeam: awayName,
          homeId: resolveTeamId(homeName), awayId: resolveTeamId(awayName),
          homeScore, awayScore, completed, live, isKnockout,
          notes: roundName, status: statusDisplay,
          displayDate, displayTime, dateObj,
        };
      }).filter(m => m && m.homeTeam && m.awayTeam)
        .sort((a, b) => (a.dateObj || 0) - (b.dateObj || 0));
    }

    function resolveTeamId(name) {
      if (!name) return null;
      if (ESPN_NAME_MAP[name] !== undefined) return ESPN_NAME_MAP[name];
      const lower = name.toLowerCase();
      for (const [k, v] of Object.entries(ESPN_NAME_MAP)) { if (k.toLowerCase() === lower) return v; }
      for (const [k, v] of Object.entries(ESPN_NAME_MAP)) { if (lower.includes(k.toLowerCase()) || k.toLowerCase().includes(lower)) return v; }
      return null;
    }

    function computeGroupStandings(matches) {
      const stats = {};
      ALL_TEAMS.forEach(t => { stats[t.id] = { id: t.id, group: t.group, pts: 0, gf: 0, ga: 0, played: 0 }; });
      matches.forEach(m => {
        if (!m.completed || m.isKnockout || !m.homeId || !m.awayId || !stats[m.homeId] || !stats[m.awayId]) return;
        stats[m.homeId].played++; stats[m.awayId].played++;
        stats[m.homeId].gf += m.homeScore; stats[m.homeId].ga += m.awayScore;
        stats[m.awayId].gf += m.awayScore; stats[m.awayId].ga += m.homeScore;
        if (m.homeScore > m.awayScore) stats[m.homeId].pts += 3;
        else if (m.homeScore < m.awayScore) stats[m.awayId].pts += 3;
        else { stats[m.homeId].pts++; stats[m.awayId].pts++; }
      });
      const gr = {}, thirds = [];
      "ABCDEFGHIJKL".split("").forEach(grp => {
        const teams = ALL_TEAMS.filter(t => t.group === grp).map(t => stats[t.id]);
        if (!teams.some(t => t.played > 0)) return;
        teams.sort((a, b) => b.pts - a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf - a.gf);
        const gm = matches.filter(m => !m.isKnockout && m.completed && (stats[m.homeId]?.group===grp || stats[m.awayId]?.group===grp));
        if (gm.length >= 6) { gr[teams[0].id]="winner"; gr[teams[1].id]="runnerUp"; thirds.push({...teams[2],gd:teams[2].gf-teams[2].ga}); }
        else { if(teams[0].played>0) gr[teams[0].id]="winner"; if(teams[1].played>0) gr[teams[1].id]="runnerUp"; }
      });
      thirds.sort((a,b) => b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
      thirds.slice(0,8).forEach(t => { gr[t.id]="third"; });
      return gr;
    }

    function computeKnockoutResults(matches) {
      const kr = {};
      matches.forEach(m => {
        if (!m.completed || !m.isKnockout || !m.homeId || !m.awayId) return;
        const n = m.notes.toLowerCase();
        let round = null;
        if (n.includes("final") && !n.includes("semi") && !n.includes("quarter") && !n.includes("third")) round = "final";
        else if (n.includes("third place")||n.includes("3rd place")) round = "thirdPlace";
        else if (n.includes("semifinal")||n.includes("semi-final")) round = "semiFinal";
        else if (n.includes("quarterfinal")||n.includes("quarter-final")) round = "quarterFinal";
        else if (n.includes("round of 16")) round = "roundOf16";
        else if (n.includes("round of 32")) round = "roundOf32";
        if (!round) return;
        const wid = m.homeScore > m.awayScore ? m.homeId : m.awayScore > m.homeScore ? m.awayId : null;
        if (wid) { if (!kr[wid]) kr[wid]=[]; if (!kr[wid].includes(round)) kr[wid].push(round); }
      });
      return kr;
    }

    function calcScores(picks, gr, kr, matches) {
      const scores = {};
      MANAGERS.forEach(m => scores[m] = 0);
      const t2m = {};
      Object.entries(picks).forEach(([mgr, ids]) => ids.forEach(id => t2m[id] = mgr));

      // Per-game group stage points
      (matches || []).forEach(m => {
        if (!m.completed || m.isKnockout || !m.homeId || !m.awayId) return;
        const homeMgr = t2m[m.homeId];
        const awayMgr = t2m[m.awayId];
        if (m.homeScore > m.awayScore) {
          if (homeMgr) scores[homeMgr] += SCORING.groupWin;
        } else if (m.homeScore < m.awayScore) {
          if (awayMgr) scores[awayMgr] += SCORING.groupWin;
        } else {
          if (homeMgr) scores[homeMgr] += SCORING.groupDraw;
          if (awayMgr) scores[awayMgr] += SCORING.groupDraw;
        }
      });

      // Group finishing bonus
      Object.entries(gr).forEach(([tid, res]) => {
        const mgr = t2m[parseInt(tid)]; if (!mgr || !res) return;
        if (res==="winner") scores[mgr]+=SCORING.groupWinner;
        else if (res==="runnerUp") scores[mgr]+=SCORING.groupRunnerUp;
        // no points for third place advance
      });

      // Knockout points
      Object.entries(kr).forEach(([tid, rounds]) => {
        const mgr = t2m[parseInt(tid)]; if (!mgr||!Array.isArray(rounds)) return;
        rounds.forEach(r => { scores[mgr]+=SCORING[r]||0; });
      });

      return scores;
    }

    // ============================================================
    // STYLES
    // ============================================================
    const S = {

      filterRow:{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:8},

      filterActive:{background:"#f59e0b",border:"1px solid #f59e0b",color:"#000",fontWeight:700},

      mgrtabActive:{background:"#1e3a5f",border:"1px solid #3b82f6",color:"#f1f5f9"},

      empty:{textAlign:"center",padding:"40px 0",color:"#475569"},

    };

    // ============================================================
    // MAIN APP
    // ============================================================
    function App() {
      const [view, setView] = useState("loading");
      const [loadError, setLoadError] = useState(null);
      const [currentManager, setCurrentManager] = useState(null);
      const [draftOrder, setDraftOrder] = useState([]);
      const [snakePicks, setSnakePicks] = useState([]);
      const [picks, setPicks] = useState({});
      const [pickIndex, setPickIndex] = useState(0);
      const [groupResults, setGroupResults] = useState({});
      const [knockoutResults, setKnockoutResults] = useState({});
      const [matches, setMatches] = useState([]);
      const [scores, setScores] = useState({});
      const [adminMode, setAdminMode] = useState(false);
      const [notif, setNotif] = useState(null);
      const [draftDone, setDraftDone] = useState(false);
      const [tab, setTab] = useState("draft");
      const [scoringOpen, setScoringOpen] = useState(false);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [saving, setSaving] = useState(false);

      function notify(msg, type = "ok") {
        setNotif({ msg, type });
        setTimeout(() => setNotif(null), 3500);
      }

      useEffect(() => {
        async function init() {
          const data = await loadAllData();
          if (!data) { setLoadError("Could not connect to database. Check your internet and try again."); setView("error"); return; }
          let { draftOrder: order, pickIndex: idx, picks: p, groupResults: gr, knockoutResults: kr } = data;
          if (!order || order.length === 0) { order = shuffleArray(MANAGERS); await saveDraftOrder(order); await savePickIndex(0); }
          setDraftOrder(order); setSnakePicks(buildSnakeOrder(order));
          setPicks(p); setPickIndex(idx); setGroupResults(gr); setKnockoutResults(kr);
          if (Object.values(p).reduce((a,b)=>a+b.length,0) >= TOTAL_TEAMS) setDraftDone(true);
          setView("home");
        }
        init();
      }, []);

      useEffect(() => {
        if (view !== "app") return;
        const t = setInterval(async () => {
          const data = await loadAllData();
          if (!data) return;
          setPicks(data.picks); setPickIndex(data.pickIndex);
          setGroupResults(data.groupResults); setKnockoutResults(data.knockoutResults);
          if (Object.values(data.picks).reduce((a,b)=>a+b.length,0) >= TOTAL_TEAMS) setDraftDone(true);
        }, 15000);
        return () => clearInterval(t);
      }, [view]);

      // Persist last good ESPN data across failed polls — never wipe live scores on a bad fetch
      const lastGoodMatches = React.useRef(null);

      const refreshESPN = useCallback(async () => {
        const staticMatches = buildStaticMatches();

        try {
          const events = await fetchESPN();
          if (events && events.length > 0) {
            const liveMatches = parseESPNMatches(events);

            // Merge live data onto static schedule
            const liveByTeams = {};
            liveMatches.forEach(m => {
              if (m.homeId && m.awayId) {
                const key = [m.homeId, m.awayId].sort().join("-");
                liveByTeams[key] = m;
              }
            });
            const merged = staticMatches.map(m => {
              if (!m.homeId || !m.awayId) return m;
              const key = [m.homeId, m.awayId].sort().join("-");
              return liveByTeams[key] || m;
            });
            liveMatches.filter(m => m.isKnockout).forEach(m => merged.push(m));
            merged.sort((a,b) => (a.dateObj||0) - (b.dateObj||0));

            lastGoodMatches.current = merged;
            setMatches(merged);

            const autoGR = computeGroupStandings(merged);
            const autoKR = computeKnockoutResults(merged);
            if (Object.keys(autoGR).length > 0 || Object.keys(autoKR).length > 0) {
              setGroupResults(autoGR); setKnockoutResults(autoKR);
              await saveKnockoutResults(autoKR);
              Object.entries(autoGR).forEach(([tid, res]) => saveGroupResult(parseInt(tid), res));
            }
            setLastUpdated(new Date());
          } else {
            // ESPN returned empty — keep last good data if we have it
            if (!lastGoodMatches.current) setMatches(staticMatches);
          }
        } catch {
          // Fetch failed — keep last good data if we have it
          if (!lastGoodMatches.current) setMatches(staticMatches);
        }
      }, []);

      useEffect(() => { refreshESPN(); const t = setInterval(refreshESPN, 90000); return () => clearInterval(t); }, [refreshESPN]);
      useEffect(() => { if (draftOrder.length) setScores(calcScores(picks, groupResults, knockoutResults, matches)); }, [picks, draftOrder, groupResults, knockoutResults, matches]);

      const doPick = useCallback(async (teamId) => {
        if (!currentManager || saving) return;
        const cur = snakePicks[pickIndex];
        if (!cur || cur.manager !== currentManager) { notify("It's not your turn!", "err"); return; }
        if (Object.values(picks).flat().includes(teamId)) { notify("Already picked!", "err"); return; }
        setSaving(true);
        const newIdx = pickIndex + 1;
        const ok1 = await savePick(currentManager, teamId, pickIndex + 1);
        const ok2 = await savePickIndex(newIdx);
        if (!ok1 || !ok2) { notify("Save failed — check connection and try again.", "err"); setSaving(false); return; }
        const newPicks = { ...picks, [currentManager]: [...(picks[currentManager]||[]), teamId] };
        setPicks(newPicks); setPickIndex(newIdx); setSaving(false);
        if (newIdx >= TOTAL_TEAMS) { setDraftDone(true); notify("🏆 Draft complete!", "ok"); }
        else notify(`Picked! Notify ${snakePicks[newIdx].manager} on WhatsApp — it's their turn.`, "ok");
      }, [currentManager, pickIndex, picks, snakePicks, saving]);

      const saveManualGR = async (teamId, result) => {
        const nr = { ...groupResults, [teamId]: result }; setGroupResults(nr); await saveGroupResult(teamId, result);
      };
      const saveManualKR = async (teamId, round) => {
        const existing = knockoutResults[teamId]||[];
        const updated = existing.includes(round) ? existing.filter(r=>r!==round) : [...existing,round];
        const nr = { ...knockoutResults, [teamId]: updated }; setKnockoutResults(nr); await saveKnockoutResults(nr);
      };
      const doReset = async () => {
        if (!window.confirm("Reset the entire draft? All picks will be permanently lost.")) return;
        const order = shuffleArray(MANAGERS);
        await resetDatabase(order);
        setDraftOrder(order); setSnakePicks(buildSnakeOrder(order));
        setPicks({}); setPickIndex(0); setGroupResults({}); setKnockoutResults({}); setDraftDone(false);
        notify("Draft reset!", "ok");
      };

      const doUndoLastPick = async () => {
        if (pickIndex === 0) { notify("No picks to undo.", "err"); return; }
        const lastPickNumber = pickIndex;
        const lastSnakePick = snakePicks[pickIndex - 1];
        if (!window.confirm(`Undo last pick? This will remove ${lastSnakePick.manager}'s most recent pick.`)) return;
        // Delete from Supabase
        await sbDelete("picks", `pick_number=eq.${lastPickNumber}`);
        const newIdx = pickIndex - 1;
        await savePickIndex(newIdx);
        // Update local state
        const newPicks = { ...picks };
        const mgr = lastSnakePick.manager;
        const mgrPicks = [...(newPicks[mgr] || [])];
        mgrPicks.pop();
        newPicks[mgr] = mgrPicks;
        setPicks(newPicks);
        setPickIndex(newIdx);
        setDraftDone(false);
        notify(`Last pick by ${mgr} has been undone.`, "ok");
      };

      if (view==="loading") return (
        <div style={S.splash}>
          <div style={{fontSize:56}}>⚽</div>
          <div style={S.loadingBar}><div style={S.loadingFill}/></div>
          <p style={{color:"#64748b",fontSize:14,margin:0}}>Connecting to database...</p>
        </div>
      );

      if (view==="error") return (
        <div style={S.splash}>
          <div style={{fontSize:48}}>❌</div>
          <p style={{color:"#f87171",textAlign:"center",padding:"0 24px",maxWidth:300}}>{loadError}</p>
          <button onClick={()=>window.location.reload()} style={{padding:"10px 24px",background:"#f59e0b",border:"none",borderRadius:8,color:"#000",fontWeight:700,cursor:"pointer"}}>Retry</button>
        </div>
      );

      if (view==="home") return (
        <div style={S.page}>
          <div style={S.hero}>
            <div style={{fontSize:60}}>⚽</div>
            <h1 style={S.heroTitle}>World Cup Fantasy</h1>
            <p style={S.heroSub}>2026 FIFA World Cup • 4-Manager Draft</p>
          </div>
          <div style={S.card}>
            <p style={S.prompt}>Select your name to continue</p>
            <div style={S.mgrGrid}>
              {MANAGERS.map(m => (
                <button key={m} style={S.mgrBtn} onClick={()=>{setCurrentManager(m);setAdminMode(false);setView("app");setTab("draft");}}>
                  <div style={S.avatar}>{m[0]}</div>
                  <span style={S.mgrLabel}>{m}</span>
                </button>
              ))}
            </div>
            <button style={S.adminBtn} onClick={()=>{setCurrentManager("Admin");setAdminMode(true);setView("app");setTab("admin");}}>⚙️ Admin / Override Scores</button>
          </div>
          <div style={S.scoreCard}>
            <button style={S.scoreToggle} onClick={()=>setScoringOpen(v=>!v)}>📊 Scoring System {scoringOpen?"▲":"▼"}</button>
            {scoringOpen && (
              <div style={{padding:"0 16px 16px"}}>
                {[["Group Win","3 pts"],["Group Draw","1 pt"],["Group Winner Bonus","+2 pts"],["Group Runner-Up Bonus","+1 pt"],["Round of 32 Win","6 pts"],["Round of 16 Win","10 pts"],["Quarterfinal Win","15 pts"],["Semifinal Win","20 pts"],["3rd Place Match Win","15 pts"],["Final / Champion","25 pts"]].map(([l,v])=>(
                  <div key={l} style={S.scoreRow}><span style={{color:"#cbd5e1",fontSize:13}}>{l}</span><span style={{color:"#f59e0b",fontWeight:700}}>{v}</span></div>
                ))}
              </div>
            )}
          </div>
        </div>
      );

      const curPick = snakePicks[pickIndex];
      const allPicked = Object.values(picks).flat();
      const tabs = ["draft","squad","leaderboard","scores",...(adminMode?["admin"]:[])];

      return (
        <div style={S.page}>
          {notif && <div style={{...S.notif,background:notif.type==="err"?"#dc2626":"#16a34a"}}>{notif.msg}</div>}
          {saving && <div style={{...S.notif,background:"#1e40af"}}>💾 Saving pick...</div>}
          <div style={S.topbar}>
            <button style={S.backBtn} onClick={()=>setView("home")}>← Back</button>
            <span style={S.topTitle}>⚽ WC Fantasy</span>
            <span style={S.topUser}>{currentManager}</span>
          </div>
          <div style={S.tabBar}>
            {tabs.map(t=>(
              <button key={t} style={{...S.tabBtn,...(tab===t?S.tabActive:{})}} onClick={()=>setTab(t)}>
                {t==="draft"?"📋 Draft":t==="squad"?"👥 Squad":t==="leaderboard"?"🏆 Board":t==="scores"?"⚽ Live":"⚙️ Admin"}
              </button>
            ))}
          </div>
          <div style={{padding:16}}>
            {tab==="draft" && <DraftTab snakePicks={snakePicks} pickIndex={pickIndex} curPick={curPick} currentManager={currentManager} picks={picks} allPicked={allPicked} draftDone={draftDone} draftOrder={draftOrder} onPick={doPick} saving={saving}/>}
            {tab==="squad" && <SquadTab picks={picks} currentManager={currentManager} groupResults={groupResults} knockoutResults={knockoutResults}/>}
            {tab==="leaderboard" && <LeaderboardTab scores={scores} picks={picks} lastUpdated={lastUpdated}/>}
            {tab==="scores" && <ScoresTab matches={matches} lastUpdated={lastUpdated} onRefresh={refreshESPN} picks={picks}/>}
            {tab==="admin" && adminMode && <AdminTab groupResults={groupResults} knockoutResults={knockoutResults} onSaveGR={saveManualGR} onSaveKR={saveManualKR} onReset={doReset} onUndo={doUndoLastPick} onRefresh={refreshESPN} picks={picks} snakePicks={snakePicks} pickIndex={pickIndex}/>}
          </div>
        </div>
      );
    }

    function DraftTab({snakePicks,pickIndex,curPick,currentManager,picks,allPicked,draftDone,draftOrder,onPick,saving}) {
      const [grpFilter,setGrpFilter]=useState("All");
      const [pendingTeam,setPendingTeam]=useState(null);
      const myPicks=picks[currentManager]||[];
      const isMyTurn=!draftDone&&curPick?.manager===currentManager;
      const filtered=ALL_TEAMS.filter(t=>grpFilter==="All"||t.group===grpFilter);

      function handleTeamClick(team) {
        if (!isMyTurn || saving) return;
        setPendingTeam(team);
      }

      function confirmPick() {
        if (pendingTeam) { onPick(pendingTeam.id); setPendingTeam(null); }
      }
      return (
        <div>
          {pendingTeam && (
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.75)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
              <div style={{background:"#1e293b",borderRadius:16,padding:24,border:"1px solid #334155",maxWidth:320,width:"100%",textAlign:"center"}}>
                <div style={{fontSize:48,marginBottom:8}}>{pendingTeam.flag}</div>
                <h3 style={{color:"#f1f5f9",fontSize:20,fontWeight:800,marginBottom:4}}>{pendingTeam.name}</h3>
                <p style={{color:"#64748b",fontSize:13,marginBottom:20}}>Group {pendingTeam.group} · Confirm this pick?</p>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setPendingTeam(null)} style={{flex:1,padding:"12px",background:"#0f172a",border:"1px solid #334155",borderRadius:10,color:"#94a3b8",fontSize:15,fontWeight:700,cursor:"pointer"}}>Cancel</button>
                  <button onClick={confirmPick} style={{flex:1,padding:"12px",background:"#16a34a",border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>✓ Draft</button>
                </div>
              </div>
            </div>
          )}
          {draftDone?(
            <div style={S.completeBanner}><div style={{fontSize:48}}>🏆</div><h2 style={{color:"#f59e0b",margin:"8px 0 4px"}}>Draft Complete!</h2><p style={{color:"#94a3b8",margin:0}}>All 48 teams drafted. Good luck!</p></div>
          ):(
            <>
              <div style={{...S.turnBanner,background:isMyTurn?"linear-gradient(135deg,#15803d,#166534)":"linear-gradient(135deg,#1e3a5f,#1e40af)"}}>
                <div>
                  <div style={{color:"rgba(255,255,255,0.6)",fontSize:11}}>Pick #{pickIndex+1} of 48</div>
                  <div style={{color:"#fff",fontSize:20,fontWeight:800}}>{curPick?.manager}'s Turn</div>
                  <div style={{color:"rgba(255,255,255,0.7)",fontSize:12}}>Round {curPick?.round} of 12</div>
                </div>
                {isMyTurn&&<div style={S.yourTurn}>YOUR TURN!</div>}
              </div>
              <div style={S.orderRow}>
                {draftOrder.map((m,i)=>{
                  const isCur=m===curPick?.manager;
                  return <div key={m} style={{...S.orderChip,background:isCur?"#f59e0b":"#1e293b"}}><span style={{color:isCur?"#000":"#64748b",fontSize:10}}>#{i+1}</span><span style={{color:isCur?"#000":"#e2e8f0",fontWeight:700,fontSize:13}}>{m}</span><span style={{color:isCur?"#000":"#64748b",fontSize:10}}>{(picks[m]||[]).length}</span></div>;
                })}
              </div>
              {!isMyTurn&&<div style={S.waiting}>⏳ Waiting for <strong>{curPick?.manager}</strong> to pick... (auto-refreshes every 15s)</div>}
            </>
          )}
          <div style={S.filterRow}>
            {["All","A","B","C","D","E","F","G","H","I","J","K","L"].map(g=>(
              <button key={g} style={{...S.filterBtn,...(grpFilter===g?S.filterActive:{})}} onClick={()=>setGrpFilter(g)}>{g}</button>
            ))}
          </div>
          <div style={S.teamGrid}>
            {filtered.map(team=>{
              const picked=allPicked.includes(team.id);
              const pickedBy=picked?Object.entries(picks).find(([,ids])=>ids.includes(team.id))?.[0]:null;
              const mine=myPicks.includes(team.id);
              const canClick=isMyTurn&&!picked&&!saving;
              return (
                <button key={team.id} disabled={!canClick} onClick={()=>canClick&&handleTeamClick(team)} style={{...S.teamCard,...(picked&&!mine?S.teamPicked:{}),...(mine?S.teamMine:{}),...(canClick?S.teamAvail:{})}}>
                  <span style={{fontSize:26}}>{team.flag}</span>
                  <span style={{color:"#e2e8f0",fontSize:11,fontWeight:600,textAlign:"center",lineHeight:1.3}}>{team.name}</span>
                  <span style={{color:"#475569",fontSize:10}}>Grp {team.group}</span>
                  {picked&&<span style={{color:mine?"#4ade80":"#f59e0b",fontSize:9,fontWeight:700}}>{mine?"✓ Mine":pickedBy}</span>}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function SquadTab({picks,currentManager,groupResults,knockoutResults}) {
      const [viewing,setViewing]=useState(currentManager);
      const teams=ALL_TEAMS.filter(t=>(picks[viewing]||[]).includes(t.id));
      function teamPts(id) {
        let p=0; const gr=groupResults[id];
        if(gr==="winner")p+=SCORING.groupWinner; else if(gr==="runnerUp")p+=SCORING.groupRunnerUp; else if(gr==="third")p+=SCORING.groupThird;
        (knockoutResults[id]||[]).forEach(r=>{p+=SCORING[r]||0;}); return p;
      }
      function badges(id) {
        const gr=groupResults[id]; const kr=knockoutResults[id]||[];
        return [gr==="winner"&&{label:"🥇 Group Winner",c:"#f59e0b"},gr==="runnerUp"&&{label:"🥈 Runner-Up",c:"#94a3b8"},gr==="third"&&{label:"3rd Advance",c:"#f97316"},kr.includes("roundOf32")&&{label:"R32 Win",c:"#3b82f6"},kr.includes("roundOf16")&&{label:"R16 Win",c:"#3b82f6"},kr.includes("quarterFinal")&&{label:"QF Win",c:"#a855f7"},kr.includes("semiFinal")&&{label:"SF Win",c:"#a855f7"},kr.includes("thirdPlace")&&{label:"3rd Place",c:"#f97316"},kr.includes("final")&&{label:"🏆 Champion",c:"#f59e0b"}].filter(Boolean);
      }
      return (
        <div>
          <div style={S.mgrtabs}>{MANAGERS.map(m=><button key={m} style={{...S.mgrtab,...(viewing===m?S.mgrtabActive:{})}} onClick={()=>setViewing(m)}>{m}</button>)}</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <h3 style={{color:"#f1f5f9",margin:0}}>{viewing}'s Squad</h3>
            <span style={{color:"#64748b",fontSize:13}}>{teams.length}/12 teams</span>
          </div>
          {teams.length===0?<div style={S.empty}>No picks yet</div>:(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {teams.map(t=>(
                <div key={t.id} style={S.squadCard}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                    <span style={{fontSize:28}}>{t.flag}</span>
                    <div style={{flex:1}}><div style={{color:"#f1f5f9",fontWeight:700,fontSize:14}}>{t.name}</div><div style={{color:"#64748b",fontSize:12}}>Group {t.group}</div></div>
                    <div style={{color:"#f59e0b",fontWeight:800,fontSize:20}}>{teamPts(t.id)} pts</div>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {badges(t.id).map((b,i)=><span key={i} style={{padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:600,background:"#1e293b",color:b.c,border:`1px solid ${b.c}40`}}>{b.label}</span>)}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function LeaderboardTab({scores,picks,lastUpdated}) {
      const ranked=[...MANAGERS].map(m=>({m,score:scores[m]||0,teams:(picks[m]||[]).length})).sort((a,b)=>b.score-a.score);
      const medals=["🥇","🥈","🥉","4️⃣"];
      return (
        <div>
          <h3 style={{color:"#f1f5f9",textAlign:"center",marginBottom:4}}>Fantasy Leaderboard</h3>
          {lastUpdated&&<p style={{color:"#475569",fontSize:11,textAlign:"center",marginBottom:16}}>Scores updated {lastUpdated.toLocaleTimeString()}</p>}
          {ranked.map((e,i)=>(
            <div key={e.m} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:i===0?"linear-gradient(135deg,#78350f,#92400e)":"#1e293b",border:`1px solid ${i===0?"#f59e0b":"#334155"}`,borderRadius:12,marginBottom:8}}>
              <span style={{fontSize:26}}>{medals[i]}</span>
              <div style={{flex:1}}><div style={{color:"#f1f5f9",fontWeight:700,fontSize:17}}>{e.m}</div><div style={{color:"#64748b",fontSize:12}}>{e.teams} teams drafted</div></div>
              <span style={{color:"#f59e0b",fontWeight:800,fontSize:24}}>{e.score}</span>
            </div>
          ))}
          <div style={{marginTop:20,background:"#0f172a",borderRadius:10,padding:"12px 16px",border:"1px solid #1e293b"}}>
            <h4 style={{color:"#94a3b8",margin:"0 0 8px"}}>Scoring Key</h4>
            {[["Group Win",3],["Group Draw",1],["Group Winner Bonus",2],["Runner-Up Bonus",1],["R32 Win",6],["R16 Win",10],["QF Win",15],["SF Win",20],["3rd Place Match",15],["Champion",25]].map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid #1e293b"}}>
                <span style={{color:"#cbd5e1",fontSize:13}}>{l}</span><span style={{color:"#f59e0b",fontWeight:700}}>{v} pts</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ScoresTab({matches,lastUpdated,onRefresh,picks}) {
      const [filter, setFilter] = useState("all");
      const live=matches.filter(m=>m.live);
      const completed=matches.filter(m=>m.completed);
      const upcoming=matches.filter(m=>!m.live&&!m.completed);

      // Build teamId -> manager lookup
      const t2m = {};
      Object.entries(picks||{}).forEach(([mgr,ids]) => ids.forEach(id => t2m[id]=mgr));

      function teamLabel(teamName, teamId) {
        const mgr = t2m[teamId];
        return mgr ? `${teamName} (${mgr})` : teamName;
      }

      // Filter matches based on tab
      const filtered = filter === "live" ? live : filter === "completed" ? completed : filter === "upcoming" ? upcoming : matches;

      // Group by date
      const byDate = {};
      filtered.forEach(m => {
        const key = m.displayDate || "TBD";
        if (!byDate[key]) byDate[key] = [];
        byDate[key].push(m);
      });

      function MatchCard({m}) {
        return (
          <div style={{background:"#1e293b",border:`1px solid ${m.live?"#f59e0b":"#334155"}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{color:"#f1f5f9",fontWeight:600,fontSize:12,flex:1,lineHeight:1.3}}>{teamLabel(m.homeTeam, m.homeId)}</span>
              <div style={{textAlign:"center",minWidth:56,flexShrink:0}}>
                {m.live && <div style={{background:"#dc2626",color:"#fff",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:3,marginBottom:2,display:"inline-block"}}>LIVE</div>}
                {(m.completed||m.live)
                  ? <div style={{color:m.live?"#f59e0b":"#f1f5f9",fontWeight:800,fontSize:20}}>{m.homeScore} – {m.awayScore}</div>
                  : <div style={{color:"#64748b",fontSize:12,fontWeight:600}}>{m.displayTime||"TBD"}</div>
                }
                {m.completed&&<div style={{background:"#334155",color:"#94a3b8",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:3,display:"inline-block"}}>FT</div>}
              </div>
              <span style={{color:"#f1f5f9",fontWeight:600,fontSize:12,flex:1,textAlign:"right",lineHeight:1.3}}>{teamLabel(m.awayTeam, m.awayId)}</span>
            </div>
            {m.live && m.status && <div style={{color:"#f59e0b",fontSize:11,textAlign:"center",marginTop:4}}>{m.status}</div>}
          </div>
        );
      }
      return (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <h3 style={{color:"#f1f5f9",margin:0}}>Schedule & Scores</h3>
            <button onClick={onRefresh} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:6,color:"#94a3b8",fontSize:12,padding:"4px 10px",cursor:"pointer"}}>↻ Refresh</button>
          </div>
          {lastUpdated&&<p style={{color:"#475569",fontSize:11,marginBottom:8}}>Updated {lastUpdated.toLocaleTimeString()} · Auto-refreshes every 90s</p>}

          <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto"}}>
            {[["all","All"],["live","🔴 Live"],["upcoming","📅 Upcoming"],["completed","✅ Results"]].map(([val,lbl])=>(
              <button key={val} onClick={()=>setFilter(val)} style={{padding:"5px 12px",background:filter===val?"#f59e0b":"#1e293b",border:`1px solid ${filter===val?"#f59e0b":"#334155"}`,borderRadius:20,color:filter===val?"#000":"#94a3b8",fontSize:12,fontWeight:filter===val?700:400,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>
                {lbl} {val==="live"&&live.length>0?`(${live.length})`:""}
              </button>
            ))}
          </div>

          {matches.length===0 ? (
            <div style={S.empty}>
              <div style={{fontSize:40,marginBottom:8}}>📅</div>
              <p style={{color:"#94a3b8",margin:"0 0 4px"}}>Schedule not loaded yet</p>
              <p style={{color:"#475569",fontSize:13,margin:"0 0 16px"}}>Tournament begins June 11, 2026</p>
              <button onClick={onRefresh} style={{padding:"8px 20px",background:"#1e40af",border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>Load Schedule</button>
            </div>
          ) : filtered.length===0 ? (
            <div style={S.empty}><p style={{color:"#475569"}}>No matches in this category yet.</p></div>
          ) : (
            Object.entries(byDate).map(([date, dayMatches]) => (
              <div key={date}>
                <div style={{color:"#f59e0b",fontWeight:700,fontSize:13,marginBottom:8,marginTop:4,paddingBottom:4,borderBottom:"1px solid #1e293b"}}>{date}</div>
                {dayMatches.map(m => <MatchCard key={m.id} m={m}/>)}
              </div>
            ))
          )}
        </div>
      );
    }

    function AdminTab({groupResults,knockoutResults,onSaveGR,onSaveKR,onReset,onUndo,onRefresh,picks,snakePicks,pickIndex}) {
      const [sub,setSub]=useState("knockout");
      const koRounds=[{key:"roundOf32",label:"Round of 32"},{key:"roundOf16",label:"Round of 16"},{key:"quarterFinal",label:"Quarterfinal"},{key:"semiFinal",label:"Semifinal"},{key:"thirdPlace",label:"3rd Place Match"},{key:"final",label:"Final (Champion)"}];
      const lastPick = pickIndex > 0 ? snakePicks[pickIndex-1] : null;
      const lastTeamId = lastPick ? (picks[lastPick.manager]||[]).slice(-1)[0] : null;
      const lastTeam = lastTeamId ? ALL_TEAMS.find(t=>t.id===lastTeamId) : null;
      return (
        <div>
          <h3 style={{color:"#f59e0b",textAlign:"center",marginBottom:4}}>Admin Panel</h3>
          <p style={{color:"#64748b",fontSize:12,textAlign:"center",marginBottom:12}}>Scores auto-update from ESPN. Use overrides only if ESPN data is wrong.</p>
          <button onClick={onRefresh} style={{width:"100%",padding:"8px",background:"#1e293b",border:"1px solid #334155",borderRadius:8,color:"#94a3b8",fontSize:13,cursor:"pointer",marginBottom:12}}>↻ Force Refresh Live Scores</button>
          <div style={{display:"flex",gap:6,marginBottom:16}}>
            {["group","knockout","reset"].map(s=>(
              <button key={s} style={{flex:1,padding:"8px 4px",background:sub===s?"#1e3a5f":"#1e293b",border:`1px solid ${sub===s?"#3b82f6":"#334155"}`,borderRadius:8,color:sub===s?"#f1f5f9":"#94a3b8",fontSize:12,cursor:"pointer"}} onClick={()=>setSub(s)}>
                {s==="group"?"Group":s==="knockout"?"Knockout":"⚠️ Reset"}
              </button>
            ))}
          </div>
          {sub==="group"&&(
            <div>
              {"ABCDEFGHIJKL".split("").map(grp=>(
                <div key={grp} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,padding:12,marginBottom:10}}>
                  <div style={{color:"#f59e0b",fontWeight:700,fontSize:13,marginBottom:8}}>Group {grp}</div>
                  {ALL_TEAMS.filter(t=>t.group===grp).map(team=>(
                    <div key={team.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                      <span style={{fontSize:18}}>{team.flag}</span>
                      <span style={{color:"#e2e8f0",flex:1,fontSize:13,minWidth:80}}>{team.name}</span>
                      <div style={{display:"flex",gap:4}}>
                        {[["winner","🥇","#f59e0b"],["runnerUp","🥈","#94a3b8"],["third","3rd","#f97316"],["clear","✕","#475569"]].map(([val,lbl,col])=>{
                          const active=val==="clear"?!groupResults[team.id]:groupResults[team.id]===val;
                          return <button key={val} onClick={()=>onSaveGR(team.id,val==="clear"?null:val)} style={{padding:"3px 8px",border:"none",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:600,background:active?col:"#1e293b",color:active?"#000":"#64748b"}}>{lbl}</button>;
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}
          {sub==="knockout"&&(
            <div>
              {koRounds.map(({key,label})=>(
                <div key={key} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,padding:12,marginBottom:10}}>
                  <div style={{color:"#f59e0b",fontWeight:700,fontSize:13,marginBottom:8}}>{label}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {ALL_TEAMS.map(team=>{
                      const active=(knockoutResults[team.id]||[]).includes(key);
                      return <button key={team.id} onClick={()=>onSaveKR(team.id,key)} style={{padding:"4px 8px",borderRadius:6,cursor:"pointer",fontSize:11,color:"#e2e8f0",fontWeight:500,background:active?"#16a34a":"#1e293b",border:`1px solid ${active?"#22c55e":"#334155"}`}}>{team.flag} {team.name}</button>;
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
          {sub==="reset"&&(
            <div>
              <div style={{background:"#0c1a2e",border:"1px solid #1e3a5f",borderRadius:10,padding:16,marginBottom:12}}>
                <h4 style={{color:"#f59e0b",margin:"0 0 8px"}}>↩ Undo Last Pick</h4>
                {lastPick && lastTeam ? (
                  <>
                    <p style={{color:"#94a3b8",fontSize:13,marginBottom:12}}>Last pick: <strong style={{color:"#f1f5f9"}}>{lastTeam.flag} {lastTeam.name}</strong> by <strong style={{color:"#f1f5f9"}}>{lastPick.manager}</strong> (Pick #{pickIndex})</p>
                    <button onClick={onUndo} style={{width:"100%",padding:12,background:"#1e40af",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>↩ Undo This Pick</button>
                  </>
                ) : (
                  <p style={{color:"#475569",fontSize:13}}>No picks to undo.</p>
                )}
              </div>
              <div style={{background:"#1c0a0a",border:"1px solid #7f1d1d",borderRadius:10,padding:16}}>
                <h4 style={{color:"#dc2626",margin:"0 0 8px"}}>⚠️ Danger Zone</h4>
                <p style={{color:"#94a3b8",fontSize:13,marginBottom:16}}>Resets the entire draft with a new randomized order. All picks permanently lost.</p>
                <button onClick={onReset} style={{width:"100%",padding:12,background:"#dc2626",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>🔄 Reset Draft & Randomize New Order</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
